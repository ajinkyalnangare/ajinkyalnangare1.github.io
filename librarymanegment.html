<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
    <style>
 #he{
            
            width:100%;
            height:166px;
            border:2px solid black;
            text-align: center;
            background-color: #d9d9d9;
            font-family: 'Dancing Script', cursive;
            
        }
        #he h1{
            
            padding:15px 0px;
            font-size: 54px;
        }
        .container{
            display: flex;
            justify-content: space-evenly;
        }
        .box1{
            margin-top: 60px;
           border-right: 2px solid black;
            width:400px;
            height: 60vh;
            text-align: center;
            font-size: 20px;
        }
        .box1 form input{
            margin-top: 30px;
            font-size: 20px;
        }
        .box2 form input{
            margin-top: 30px;
            font-size: 20px;
        }
        h1{
            font-size: 40px;
        }
        .box2{
           
            width:400px;
            height: 60vh;
            
            margin-top: 60px;
            font-size: 20px;
        }
        button{
            margin-top: 20px;
            border-radius: 10px;
            padding: 1%;
            background-color: #d9d9d9;
          
           
        }
        button a{

            text-decoration: none;
            color: black;
            
        }
        .box2 button{
            margin-left: 180px;
        }
   .box2 h1{
    align-items: center;
   }
    </style>
</head>
<body>
    <div id="he">
        <h1>
            LIBRARY MANAGMENT SYSTEM
        </h1>
    </div>
    <div class="container">
        
        <div class="box1">
            
           <h1> User Login</h1>
            <form action="">
                <div>
                   User Id: &nbsp; <input type="text">
                </div>
                <div>
                   Password: <input type="text">
                </div>
                <button>
                    <a href="l2.html" target="_blank">LOGIN</a>
                </button>
            </form>
        </div>
        <div class="box2">
           <h1>  Student Login</h1>
            <form action="">
                <div>
                   Student Id: <input type="text">
                </div>
                <div>
                   password: &nbsp;<input type="text">
                </div>
                <button>
                    <a href="l4.html" target="_blank">LOGIN</a>
                </button>
            </form>
        </div>
    </div>
</body>
</html>
